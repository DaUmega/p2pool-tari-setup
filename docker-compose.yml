x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # --- Tor Anonymity Service ---
  tor:
    build: ./build/tor
    container_name: tor
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - ${TOR_DATA_DIR}:/var/lib/tor
    networks:
      mining_net:
        ipv4_address: 172.28.0.25
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9050"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Monero Daemon (monerod) ---
  # Only starts if "local_node" profile is active
  monerod:
    profiles: ["local_node"]
    build: ./build/monero
    container_name: monerod
    restart: unless-stopped
    stop_grace_period: 1m
    logging: *default-logging
    environment:
      - MONERO_NODE_USERNAME=${MONERO_NODE_USERNAME}
      - MONERO_NODE_PASSWORD=${MONERO_NODE_PASSWORD}
      - MONERO_ONION_ADDRESS=${MONERO_ONION_ADDRESS}
      - MONERO_PRUNE=${MONERO_PRUNE}
    volumes:
      - ${MONERO_DATA_DIR}:/root/.bitmonero
      - /dev/hugepages:/dev/hugepages
      - ./build/monero/bitmonero.conf.template:/root/bitmonero.conf.template:ro
    ports:
      - "18081:18081"
    networks:
      mining_net:
        ipv4_address: 172.28.0.26
    depends_on:
      tor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "--digest", "-u", "${MONERO_NODE_USERNAME}:${MONERO_NODE_PASSWORD}", "http://localhost:18081/get_info"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # --- Tari Base Node ---
  tari:
    image: quay.io/tarilabs/minotari_node:v5.2.1-mainnet
    container_name: tari
    restart: unless-stopped
    stop_grace_period: 1m
    logging: *default-logging
    dns:
      - 1.1.1.1
      - 8.8.8.8
    dns_search: .
    dns_opt:
      - use-vc
    environment:
      - WAIT_FOR_TOR=1
    volumes:
      - ${TARI_DATA_DIR}:/var/tari/node
      - ./build/tari:/var/tari/config
    command:
      - --disable-splash-screen
      - --non-interactive
    networks:
      mining_net:
        ipv4_address: 172.28.0.27
    depends_on:
      tor:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "ps | grep minotari_node || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # --- P2Pool Node ---
  p2pool:
    build: ./build/p2pool
    container_name: p2pool
    restart: unless-stopped
    logging: *default-logging
    privileged: true
    volumes:
      - ${P2POOL_DATA_DIR}:/root
      - ${P2POOL_DATA_DIR}/stats:/stats
      - /dev/hugepages:/dev/hugepages
      - /var/run/dbus:/var/run/dbus:ro
      - /var/run/avahi-daemon/socket:/var/run/avahi-daemon/socket:ro
    command:
      - --host
      - ${MONERO_NODE_HOST} # Dynamic Host
      - --rpc-port
      - "${MONERO_RPC_PORT}"
      - --rpc-login
      - "${MONERO_NODE_USERNAME}:${MONERO_NODE_PASSWORD}" # Only used if auth required
      - --zmq-port
      - "${MONERO_ZMQ_PORT}"
      - --wallet
      - ${MONERO_WALLET_ADDRESS} 
      - --merge-mine
      - tari://172.28.0.27:18142
      - ${TARI_WALLET_ADDRESS}
      - --onion-address
      - ${P2POOL_ONION_ADDRESS} 
      - --local-api
      - --stratum
      - 0.0.0.0:3333
      - --p2p
      - 0.0.0.0:${P2POOL_PORT}
      - --data-api
      - /stats
      - ${P2POOL_FLAGS}
    networks:
      mining_net:
        ipv4_address: 172.28.0.28
    depends_on:
      # monerod dependency removed to allow remote node operation
      tari:
        condition: service_healthy

  # --- XMRig Proxy ---
  xmrig-proxy:
    build: ./build/xmrig-proxy
    container_name: xmrig-proxy
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "3333:3333"
    environment:
      - PROXY_API_PORT=${PROXY_API_PORT}
      - PROXY_AUTH_TOKEN=${PROXY_AUTH_TOKEN}
    command:
      - -o
      - ${P2POOL_URL}
      - -u
      - ${MONERO_WALLET_ADDRESS}
      - -b
      - 0.0.0.0:3333
      - -m
      - simple
      - --coin
      - monero
      - --verbose
      - --http-host
      - 0.0.0.0
      - --http-port
      - ${PROXY_API_PORT}
      - --http-access-token
      - ${PROXY_AUTH_TOKEN}
      - --http-no-restricted
    networks:
      mining_net:
        ipv4_address: 172.28.0.29
    depends_on:
      - p2pool

  # --- Monitoring Dashboard ---
  dashboard:
      build: ./build/dashboard
      container_name: dashboard
      restart: unless-stopped
      logging: *default-logging
      network_mode: "host"
      volumes:
        - ${P2POOL_DATA_DIR}/stats:/app/stats:ro
        - ${DASHBOARD_DATA_DIR}:/data
        - /var/run/dbus:/var/run/dbus:ro
        - /var/run/avahi-daemon/socket:/var/run/avahi-daemon/socket
      environment:
      - HOST_IP=${HOST_IP:-127.0.0.1}
      - TZ=America/Chicago
      - MONERO_NODE_HOST=${MONERO_NODE_HOST:-172.28.0.26}
      - P2POOL_URL=${P2POOL_URL}
      - MONERO_WALLET_ADDRESS=${MONERO_WALLET_ADDRESS}
      - XVB_ENABLED=${XVB_ENABLED}
      - XVB_POOL_URL=${XVB_POOL_URL}
      - XVB_DONOR_ID=${XVB_DONOR_ID}
      - PROXY_HOST=172.28.0.29
      - PROXY_API_PORT=${PROXY_API_PORT}
      - PROXY_AUTH_TOKEN=${PROXY_AUTH_TOKEN}
      - DOCKER_PROXY_URL=tcp://172.28.0.30:2375
      - TARI_GRPC_ADDRESS=172.28.0.27:18142

  # --- Docker Socket Proxy ---
  docker-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: docker-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - LOGS=1
    networks:
      mining_net:
        ipv4_address: 172.28.0.30

  # --- Caddy Reverse Proxy ---
  # Provides local automatic HTTPS with self-signed certificates
  # Both Caddy and Dashboard are on the host network, allowing direct 127.0.0.1 routing
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data 

# --- Volumes ---
volumes:
  caddy_data: 

# --- Network Configuration ---
networks:
  mining_net:
    driver: bridge
    name: mining_net
    ipam:
      config:
        - subnet: 172.28.0.0/24